<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d2b1a">
    <title>Jungle Dash</title>
    <style>
        /* ── Reset y base ──────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050d07;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Contenedor principal ──────────────────────────────────────────── */
        /* Sin box-shadow ni border: en fullscreen generan gaps blancos y
           consumen GPU de forma innecesaria.                                  */
        #jd-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Canvas (posicionado absolutamente por JD_Renderer) ────────────── */
        #JD_canvas {
            position: absolute;
            display: block;
            cursor: pointer;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── HUD flotante ──────────────────────────────────────────────────── */
        #jd-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1vh 1.5vw;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
            pointer-events: none; /* El HUD no bloquea el canvas */
        }

        /* Todos los hijos del HUD recuperan eventos de puntero */
        #jd-hud > * { pointer-events: all; }

        /* ── Botón de retorno ──────────────────────────────────────────────── */
        #jd-back-btn {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: clamp(11px, 1.2vw, 14px);
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.6vh 1vw;
            transition: background 0.2s;
        }
        #jd-back-btn:hover,
        #jd-back-btn:active { background: rgba(40,40,40,0.7); }
        #jd-back-btn svg { flex-shrink: 0; }

        /* ── Info de sesión (puntos) ───────────────────────────────────────── */
        #jd-session-info {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            color: rgba(255,255,255,0.88);
            font-size: clamp(11px, 1.2vw, 14px);
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.6vh 1vw;
        }
        #jd-session-info svg { flex-shrink: 0; }
        #jd-pts-label { font-weight: 600; font-size: clamp(10px, 1vw, 12px); opacity: 0.7; }
        #jd-score-display { font-weight: 700; font-size: clamp(11px, 1.2vw, 14px); color: #ffd700; letter-spacing: 1px; }

        /* ── HUD inferior: récord (solo visible en PLAYING) ────────────────── */
        #jd-hud-bottom {
            position: fixed;
            bottom: 1.5vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 2vw;
            pointer-events: none;
        }
        .jd-badge {
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 0.5vh 1.5vw;
            color: rgba(255,255,255,0.72);
            font-size: clamp(10px, 1.1vw, 13px);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .jd-badge span {
            color: #ffd700;
            margin-left: 4px;
        }

        /* ── Botón de mute (solo visible en pantallas START y GAMEOVER) ─────── */
        /* Se separa del HUD superior para evitar activaciones accidentales
           con los pulgares durante el juego.                                   */
        #jd-mute-container {
            position: fixed;
            bottom: 4vh;
            right: 2vw;
            z-index: 200;
            transition: opacity 0.3s, visibility 0.3s;
        }
        #jd-mute-container.jd-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #jd-mute-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 0.6vh 0.8vw;
            cursor: pointer;
            color: rgba(255,255,255,0.85);
            transition: background 0.2s;
            width: clamp(32px, 3.5vw, 44px);
            height: clamp(32px, 3.5vw, 44px);
        }
        #jd-mute-btn:hover,
        #jd-mute-btn:active { background: rgba(40,40,40,0.75); }
        .jd-sound-off { display: none; color: rgba(255,100,100,0.85); }

        /* ── Overlay "Gira tu dispositivo" ─────────────────────────────────── */
        /* Oculto por defecto. JD_Core lo activa mediante JS solo cuando
           orientation.lock falla y el dispositivo sigue en portrait.
           Sin @media portrait: la pantalla START permanece visible en cualquier
           orientación antes de la primera interacción, permitiendo que el
           primer toque desbloquee Fullscreen API y orientation.lock. */
        #jd-rotate-overlay {
            display: none;              /* activado exclusivamente por JS */
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #050d07;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: rgba(255,255,255,0.85);
            text-align: center;
            padding: 24px;
        }
        #jd-rotate-overlay svg {
            animation: jd-rotate-icon 2s ease-in-out infinite;
            opacity: 0.75;
        }
        @keyframes jd-rotate-icon {
            0%, 100% { transform: rotate(-15deg); }
            50%       { transform: rotate(15deg);  }
        }
        #jd-rotate-overlay p {
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        #jd-rotate-overlay small {
            font-size: clamp(12px, 2.5vw, 15px);
            opacity: 0.55;
        }

        /* ── Scrollbar oculta ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- ── Overlay de orientación portrait ──────────────────────────────────── -->
<!-- Activado por JS (JD_Core._checkRotateOverlay) solo si orientation.lock
     falla y el dispositivo sigue en portrait. No se activa por CSS. -->
<div id="jd-rotate-overlay" aria-live="polite" role="alert">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,0.75)" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
        <path d="M8 2h8"/>
        <!-- flecha indicando rotación -->
        <path d="M17 9l3 3-3 3" stroke="rgba(255,200,0,0.85)" stroke-width="2"/>
        <path d="M20 12H10" stroke="rgba(255,200,0,0.85)" stroke-width="2"/>
    </svg>
    <p>Gira tu dispositivo</p>
    <small>Jungle Dash requiere orientación horizontal</small>
</div>

<!-- ── Contenedor del juego ──────────────────────────────────────────────── -->
<div id="jd-container">
    <canvas id="JD_canvas" role="img" aria-label="Jungle Dash — juego de carrera infinita"></canvas>
</div>

<!-- ── HUD superior ─────────────────────────────────────────────────────── -->
<!-- El botón de mute se ha retirado de aquí para evitar pulsaciones
     accidentales durante el juego. Ahora reside en #jd-mute-container.      -->
<header id="jd-hud" role="toolbar" aria-label="Controles del juego">

    <!-- Botón de retorno al hub — ruta obligatoria: ../../index.html -->
    <a id="jd-back-btn" href="../../index.html" aria-label="Volver a Love Arcade">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <path d="M11 17.2l-6.3-6.3c-.4-.4-.4-1 0-1.4L11 3.2M7 10.1h13"/>
        </svg>
        Love Arcade
    </a>

    <!-- Info de sesión: puntuación actual -->
    <div id="jd-session-info" role="status" aria-live="polite" aria-atomic="true"
         aria-label="Puntuación actual">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="jd-pts-label">PUNTOS</span>
        <span id="jd-score-display">000000</span>
    </div>

</header>

<!-- ── HUD inferior: récord ──────────────────────────────────────────────── -->
<div id="jd-hud-bottom" role="status" aria-label="Récord personal">
    <div class="jd-badge" id="jd-record-badge">
        RÉCORD <span id="jd-highscore-display">000000</span>
    </div>
</div>

<!-- ── Botón de mute (pantallas START / GAMEOVER únicamente) ─────────────── -->
<!-- Desacoplado del HUD superior. JD_Core.js gestiona su visibilidad. -->
<div id="jd-mute-container" aria-label="Control de audio">
    <button id="jd-mute-btn" type="button" aria-label="Activar/desactivar audio">
        <!-- Ícono sonido activo -->
        <svg class="jd-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <!-- Ícono mute -->
        <svg class="jd-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Scripts — orden de carga: dependencias primero, núcleo al final.
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="js/JD_Audio.js"></script>
<script src="js/JD_Physics.js"></script>
<script src="js/JD_Entities.js"></script>
<script src="js/JD_Renderer.js"></script>
<script src="js/JD_Core.js"></script>

<!-- Glue: Fullscreen/Orientación + sincronización del HUD HTML ────────────
     v1.3.0 — Ejecución Plana con Captura de Fase.
     requestFullscreen es la primera instrucción del primer stack frame del
     gesto. Se usa { capture: true } para disparar ANTES que cualquier listener
     del canvas (JD_Core), preservando el Transient Activation Token en Android.
     e.stopPropagation() evita el doble disparo en el canvas listener de JD_Core.  -->
<script>
(function () {
    'use strict';

    const JD_container     = document.getElementById('jd-container');
    const JD_overlay       = document.getElementById('jd-rotate-overlay');
    const JD_hsDisplay     = document.getElementById('jd-highscore-display');
    const JD_scoreDisplay  = document.getElementById('jd-score-display');
    const JD_muteContainer = document.getElementById('jd-mute-container');

    // ── Función de inmersión: síncrona y plana ───────────────────────────────
    // Regla crítica: requestFullscreen y orientation.lock deben ser las
    // primeras llamadas dentro del primer stack frame del gesto de usuario.
    // Cualquier micro-tarea, promesa o await previo invalida el token en Android.
    function JD_launchImmersion() {

        // 1. Fullscreen — PRIMERA instrucción (token activo garantizado)
        const JD_req = JD_container
            ? (JD_container.requestFullscreen || JD_container.webkitRequestFullscreen)
            : null;
        if (JD_req) JD_req.call(JD_container);

        // 2. Lock de orientación — SEGUNDA instrucción (mismo frame síncrono)
        if (screen.orientation && typeof screen.orientation.lock === 'function') {
            screen.orientation.lock('landscape').catch(() => {
                // Si el lock falla aquí, 'fullscreenchange' lo reintenta.
            });
        }

        // 3. Ocultar overlay de rotación
        if (JD_overlay) JD_overlay.style.display = 'none';

        // 4. Iniciar lógica del juego.
        //    Se llama aquí porque e.stopPropagation() (ver trigger) impide
        //    que el evento llegue al canvas listener de JD_Core.
        //    JD_Audio.init() también es necesario para desbloquear el AudioContext.
        if (typeof JD_Audio !== 'undefined') JD_Audio.init();
        if (typeof JD_Core  !== 'undefined' && JD_Core.state === 'START') {
            JD_Core.startGame();
        }
    }

    // ── Listener de primera interacción ─────────────────────────────────────
    // { capture: true } — fase de captura: se ejecuta ANTES que cualquier
    // listener del canvas registrado por JD_Core (fase de burbuja), garantizando
    // que requestFullscreen sea lo primero en el stack frame del gesto.
    // e.stopPropagation() evita que JD_Core._onActionStart procese este mismo
    // evento y llame a startGame() o startJump() una segunda vez.
    const JD_trigger = (e) => {
        e.stopPropagation();
        JD_launchImmersion();
        window.removeEventListener('touchstart', JD_trigger, { capture: true });
        window.removeEventListener('click',      JD_trigger, { capture: true });
    };

    window.addEventListener('touchstart', JD_trigger, { capture: true, passive: false });
    window.addEventListener('click',      JD_trigger, { capture: true });

    // ── Respaldo: fullscreenchange ───────────────────────────────────────────
    // Android puede rechazar el primer orientation.lock porque el cambio de
    // pantalla completa no ha finalizado aún en el sistema. Este listener se
    // dispara ~200–500 ms después (señal del SO) y reintenta el lock.
    const JD_onFSChange = () => {
        const JD_fs = document.fullscreenElement || document.webkitFullscreenElement;
        if (JD_fs && screen.orientation && typeof screen.orientation.lock === 'function') {
            screen.orientation.lock('landscape').catch(() => {});
        }
    };
    document.addEventListener('fullscreenchange',       JD_onFSChange);
    document.addEventListener('webkitfullscreenchange', JD_onFSChange);

    // ── Listener de orientación: auto-ocultar overlay ───────────────────────
    // Cuando el usuario gira el dispositivo manualmente (iOS/Safari),
    // el overlay desaparece sin requerir un nuevo toque.
    window.addEventListener('resize', () => {
        if (JD_overlay && window.innerWidth >= window.innerHeight) {
            JD_overlay.style.display = 'none';
        }
    });

    // ── Ticker de UI: score, récord y visibilidad del mute (~10 fps) ─────────
    setInterval(() => {
        // Puntuación en tiempo real (PLAYING / GAMEOVER)
        if (JD_scoreDisplay && typeof JD_Core !== 'undefined') {
            const JD_s = (JD_Core.state === 'PLAYING' || JD_Core.state === 'GAMEOVER')
                ? Math.floor(JD_Core.score)
                : 0;
            JD_scoreDisplay.textContent = JD_s.toString().padStart(6, '0');
        }

        // Récord personal en el badge inferior
        if (JD_hsDisplay) {
            const JD_hs = parseInt(localStorage.getItem('JD_highscore') || '0', 10);
            JD_hsDisplay.textContent = JD_hs.toString().padStart(6, '0');
        }

        // Botón de mute: oculto durante PLAYING para evitar toques accidentales
        if (JD_muteContainer && typeof JD_Core !== 'undefined') {
            JD_muteContainer.classList.toggle('jd-hidden', JD_Core.state === 'PLAYING');
        }

    }, 100);

})();
</script>

<!-- Motor central de Love Arcade — DEBE ir al final del body ────────────── -->
<script src="../../js/app.js"></script>

</body>
</html>

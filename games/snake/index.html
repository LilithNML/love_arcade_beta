<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>Snake</title>
  <style>
    /* ─────────────────────────────────────────────
       DESIGN TOKENS — Flat Design, No Glassmorphism
       Font: system sans-serif (no Courier New)
       ───────────────────────────────────────────── */
    :root {
      --LAS_bg:       #0d0d0d;
      --LAS_surface:  #141414;
      --LAS_surface2: #1c1c1c;
      --LAS_border:   #2a2a2a;
      --LAS_accent:   #30d158;
      --LAS_accent2:  #ff9f0a;
      --LAS_danger:   #ff3b30;
      --LAS_info:     #0a84ff;
      --LAS_purple:   #bf5af2;
      --LAS_text:     #f5f5f5;
      --LAS_text2:    #888888;
      --LAS_text3:    #444444;
      --LAS_gold:     #ffd60a;

      /* System sans-serif — no monospace anywhere in UI */
      --LAS_font: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--LAS_bg);
      color: var(--LAS_text);
      font-family: var(--LAS_font);
      touch-action: none;
    }

    /* ─────────────────────────────────────────────
       APP SHELL
       ───────────────────────────────────────────── */
    #LAS_app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────── */
    #LAS_header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--LAS_surface);
      border-bottom: 1px solid var(--LAS_border);
      padding: 0 14px;
      height: 48px;
      flex-shrink: 0;
      z-index: 10;
    }

    .LAS_header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--LAS_accent);
      text-transform: uppercase;
    }

    .LAS_header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Icon buttons — SVG only, no emoji */
    .LAS_icon-btn {
      background: none;
      border: 1px solid var(--LAS_border);
      color: var(--LAS_text2);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .LAS_icon-btn:hover, .LAS_icon-btn:focus {
      border-color: var(--LAS_accent);
      color: var(--LAS_accent);
      outline: none;
    }
    .LAS_icon-btn.active {
      border-color: var(--LAS_accent);
      color: var(--LAS_accent);
    }
    .LAS_icon-btn svg { pointer-events: none; }

    .LAS_pause-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      background: none;
      border: 1px solid var(--LAS_border);
      color: var(--LAS_text2);
      padding: 0 10px;
      height: 34px;
      display: none;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .LAS_pause-label.visible { display: flex; }
    .LAS_pause-label:hover {
      border-color: var(--LAS_accent);
      color: var(--LAS_accent);
    }

    /* ─────────────────────────────────────────────
       SCORE BAR
       ───────────────────────────────────────────── */
    #LAS_scorebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--LAS_surface);
      border-bottom: 1px solid var(--LAS_border);
      padding: 6px 14px;
      flex-shrink: 0;
    }

    .LAS_score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .LAS_score-label {
      font-size: 8px;
      font-weight: 600;
      color: var(--LAS_text3);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .LAS_score-val {
      font-size: 18px;
      font-weight: 800;
      color: var(--LAS_text);
      line-height: 1;
    }

    #LAS_comboWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    #LAS_comboLabel {
      font-size: 8px;
      font-weight: 600;
      color: var(--LAS_text3);
      letter-spacing: 2px;
    }
    #LAS_comboBarOuter {
      width: 80px;
      height: 6px;
      background: var(--LAS_surface2);
      border: 1px solid var(--LAS_border);
      overflow: hidden;
    }
    #LAS_comboBarFill {
      height: 100%;
      background: var(--LAS_accent2);
      width: 0%;
      transition: width 0.1s linear;
    }
    #LAS_comboMulti {
      font-size: 13px;
      font-weight: 800;
      color: var(--LAS_text3);
    }

    /* ─────────────────────────────────────────────
       CANVAS AREA
       ───────────────────────────────────────────── */
    #LAS_canvasWrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--LAS_bg);
      position: relative;
      overflow: hidden;
    }

    #LAS_canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* Power-up badge */
    #LAS_powerupBadge {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--LAS_text2);
      background: var(--LAS_surface);
      border: 1px solid var(--LAS_border);
      padding: 3px 7px;
      pointer-events: none;
      display: none;
    }
    #LAS_powerupBadge.visible { display: block; }
    #LAS_powerupBadge.magnet  { color: var(--LAS_info);   border-color: var(--LAS_info); }
    #LAS_powerupBadge.ghost   { color: var(--LAS_purple); border-color: var(--LAS_purple); }
    #LAS_powerupBadge.brake   { color: var(--LAS_gold);   border-color: var(--LAS_gold); }

    /* Combo border flash — solid, no blur */
    #LAS_canvasWrap.LAS_combo-flash   { outline: 3px solid #ff9f0a; }
    #LAS_canvasWrap.LAS_combo-flash-2 { outline: 3px solid #ff6b00; }
    #LAS_canvasWrap.LAS_combo-flash-3 { outline: 3px solid #ff3b30; }

    /* ─────────────────────────────────────────────
       SCREENS
       ───────────────────────────────────────────── */
    .LAS_screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--LAS_bg);
      z-index: 20;
      padding: 24px 20px;
    }
    .LAS_screen.hidden { display: none; }

    /* ─────────────────────────────────────────────
       START SCREEN
       ───────────────────────────────────────────── */
    .LAS_logo {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--LAS_accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .LAS_tagline {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--LAS_text3);
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    /* ── Skin Selector (arrow-based) ── */
    #LAS_skinSection {
      width: 100%;
      max-width: 320px;
      margin-bottom: 28px;
    }
    .LAS_skin-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--LAS_text3);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Selector row: [arrow] [card] [arrow] */
    #LAS_skinSelector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .LAS_arrow-btn {
      background: var(--LAS_surface);
      border: 1px solid var(--LAS_border);
      color: var(--LAS_text2);
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .LAS_arrow-btn:hover:not(:disabled) {
      border-color: var(--LAS_accent);
      color: var(--LAS_accent);
    }
    .LAS_arrow-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .LAS_arrow-btn svg { pointer-events: none; }

    /* Central skin card */
    #LAS_skinCard {
      flex: 1;
      max-width: 200px;
      background: var(--LAS_surface);
      border: 1px solid var(--LAS_border);
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #LAS_skinCard.selected { border-color: var(--LAS_accent); }

    #LAS_skinPreviewCanvas {
      display: block;
    }

    #LAS_skinCardName {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--LAS_text);
      text-transform: uppercase;
    }

    #LAS_skinCardSub {
      font-size: 9px;
      font-weight: 500;
      color: var(--LAS_text3);
      letter-spacing: 1px;
      text-align: center;
    }

    /* Dots navigation indicator */
    #LAS_skinDots {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      justify-content: center;
    }
    .LAS_dot {
      width: 5px;
      height: 5px;
      background: var(--LAS_border);
    }
    .LAS_dot.active { background: var(--LAS_accent); }

    /* Select button */
    #LAS_selectSkinBtn {
      width: 100%;
      max-width: 200px;
      height: 34px;
      background: var(--LAS_surface2);
      border: 1px solid var(--LAS_accent);
      color: var(--LAS_accent);
      font-family: var(--LAS_font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.12s;
    }
    #LAS_selectSkinBtn:hover:not(:disabled) { background: var(--LAS_surface); }
    #LAS_selectSkinBtn:disabled {
      border-color: var(--LAS_border);
      color: var(--LAS_text3);
      cursor: default;
    }

    /* ── Play button ── */
    #LAS_playBtn {
      width: 100%;
      max-width: 260px;
      height: 52px;
      background: var(--LAS_accent);
      border: none;
      color: #000;
      font-family: var(--LAS_font);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s;
    }
    #LAS_playBtn:hover  { background: #28b84e; }
    #LAS_playBtn:active { background: #1e8c3c; transform: scale(0.99); }

    .LAS_best-score {
      margin-top: 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--LAS_text3);
    }
    .LAS_best-score span { color: var(--LAS_text2); }

    /* ─────────────────────────────────────────────
       GAME OVER SCREEN
       ───────────────────────────────────────────── */
    .LAS_go-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--LAS_danger);
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .LAS_go-stats {
      width: 100%;
      max-width: 260px;
      border: 1px solid var(--LAS_border);
      margin-bottom: 20px;
    }
    .LAS_go-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--LAS_border);
    }
    .LAS_go-stat-row:last-child { border-bottom: none; }
    .LAS_go-stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--LAS_text3);
      text-transform: uppercase;
    }
    .LAS_go-stat-val {
      font-size: 16px;
      font-weight: 800;
      color: var(--LAS_text);
    }
    .LAS_go-stat-val.highlight { color: var(--LAS_accent2); }

    .LAS_go-reward {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--LAS_gold);
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid var(--LAS_gold);
      padding: 8px 20px;
      text-transform: uppercase;
    }
    .LAS_go-new-record {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--LAS_accent2);
      margin-bottom: 10px;
      text-transform: uppercase;
      display: none;
    }
    .LAS_go-new-record.visible { display: block; }

    #LAS_playAgainBtn {
      width: 100%;
      max-width: 260px;
      height: 48px;
      background: var(--LAS_surface2);
      border: 1px solid var(--LAS_accent);
      color: var(--LAS_accent);
      font-family: var(--LAS_font);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.12s;
    }
    #LAS_playAgainBtn:hover { background: var(--LAS_surface); }

    #LAS_menuBtn {
      background: none;
      border: none;
      color: var(--LAS_text3);
      font-family: var(--LAS_font);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px;
    }
    #LAS_menuBtn:hover { color: var(--LAS_text2); }

    /* ─────────────────────────────────────────────
       UNLOCK TOAST
       ───────────────────────────────────────────── */
    #LAS_unlockToast {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--LAS_surface);
      border: 1px solid var(--LAS_accent2);
      color: var(--LAS_accent2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 8px 16px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      text-align: center;
      white-space: nowrap;
      text-transform: uppercase;
    }
    #LAS_unlockToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="LAS_app">

  <!-- HEADER -->
  <header id="LAS_header">
    <div class="LAS_header-title">Snake</div>
    <div class="LAS_header-actions">
      <!-- Pause button (SVG icon) -->
      <button class="LAS_pause-label" id="LAS_pauseBtn" aria-label="Pause">PAUSE</button>

      <!-- Mute toggle (SVG speaker icon) -->
      <button class="LAS_icon-btn" id="LAS_muteBtn" aria-label="Toggle sound">
        <svg id="LAS_muteIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 5.5H4.5L8 2.5V13.5L4.5 10.5H2V5.5Z" fill="currentColor"/>
          <path id="LAS_soundWave1" d="M10 5.5C10.8 6.2 11.3 7 11.3 8C11.3 9 10.8 9.8 10 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <path id="LAS_soundWave2" d="M12 3.5C13.5 4.8 14.3 6.3 14.3 8C14.3 9.7 13.5 11.2 12 12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <line id="LAS_muteX" x1="10" y1="5" x2="14.5" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="display:none"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SCORE BAR -->
  <div id="LAS_scorebar">
    <div class="LAS_score-block">
      <div class="LAS_score-label">Score</div>
      <div class="LAS_score-val" id="LAS_scoreVal">0</div>
    </div>

    <div id="LAS_comboWrap">
      <div id="LAS_comboLabel">COMBO</div>
      <div id="LAS_comboBarOuter">
        <div id="LAS_comboBarFill"></div>
      </div>
      <div id="LAS_comboMulti">x1</div>
    </div>

    <div class="LAS_score-block">
      <div class="LAS_score-label">Best</div>
      <div class="LAS_score-val" id="LAS_bestVal">0</div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div id="LAS_canvasWrap">
    <canvas id="LAS_canvas"></canvas>
    <div id="LAS_powerupBadge"></div>
  </div>

  <!-- UNLOCK TOAST -->
  <div id="LAS_unlockToast"></div>

  <!-- ─── START SCREEN ─── -->
  <div id="LAS_startScreen" class="LAS_screen">
    <div class="LAS_logo">Snake</div>
    <div class="LAS_tagline">Love Arcade Classic</div>

    <div id="LAS_skinSection">
      <div class="LAS_skin-label">Select Skin</div>

      <!-- Arrow-based selector -->
      <div id="LAS_skinSelector">
        <!-- Arrow left SVG -->
        <button class="LAS_arrow-btn" id="LAS_prevSkinBtn" aria-label="Previous skin">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Active skin card -->
        <div id="LAS_skinCard">
          <canvas id="LAS_skinPreviewCanvas" width="100" height="48"></canvas>
          <div id="LAS_skinCardName">Classic Green</div>
          <div id="LAS_skinCardSub">Best: 0 pts</div>
        </div>

        <!-- Arrow right SVG -->
        <button class="LAS_arrow-btn" id="LAS_nextSkinBtn" aria-label="Next skin">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Pagination dots -->
      <div id="LAS_skinDots"></div>

      <!-- Select / locked button -->
      <div style="display:flex;justify-content:center;margin-top:8px;">
        <button id="LAS_selectSkinBtn">SELECT</button>
      </div>
    </div>

    <button id="LAS_playBtn">PLAY</button>
    <div class="LAS_best-score">BEST: <span id="LAS_startBest">0</span></div>
  </div>

  <!-- ─── GAME OVER SCREEN ─── -->
  <div id="LAS_gameoverScreen" class="LAS_screen hidden">
    <div class="LAS_go-title">Game Over</div>

    <div class="LAS_go-stats">
      <div class="LAS_go-stat-row">
        <div class="LAS_go-stat-label">Score</div>
        <div class="LAS_go-stat-val" id="LAS_goScore">0</div>
      </div>
      <div class="LAS_go-stat-row">
        <div class="LAS_go-stat-label">Length</div>
        <div class="LAS_go-stat-val" id="LAS_goLength">3</div>
      </div>
      <div class="LAS_go-stat-row">
        <div class="LAS_go-stat-label">Best</div>
        <div class="LAS_go-stat-val" id="LAS_goBest">0</div>
      </div>
    </div>

    <div class="LAS_go-new-record" id="LAS_goNewRecord">New Record</div>
    <div class="LAS_go-reward" id="LAS_goReward">+0 Coins Earned</div>

    <button id="LAS_playAgainBtn">Play Again</button>
    <button id="LAS_menuBtn">Main Menu</button>
  </div>

</div><!-- #LAS_app -->

<!-- ─── LOVE ARCADE CORE (must load first — provides window.GameCenter) ─── -->
<!-- app.js sets window.GameCenter before any snake module runs.            -->
<!-- The standalone stub below only activates when this tag is absent.      -->
<script src="../../js/app.js"></script>

<!-- ─── SNAKE MODULES ─── -->
<script src="snake-audio.js"></script>
<script src="snake-economy.js"></script>
<script src="snake-renderer.js"></script>
<script src="snake-core.js"></script>

<script>
/* ─────────────────────────────────────────────
   MAIN ORCHESTRATOR v1.3
   Wires all 4 modules together.
   Changes v1.3:
     - <script src="../../js/app.js"> added BEFORE game modules
       so window.GameCenter is the real Love Arcade instance, not the stub.
     - Stub remains guarded by if(!window.GameCenter) for standalone use.
   Changes v1.2:
     - onInvalidDirection → sfxInvalidTurn
     - onTurn → sfxTurn (turn confirmation audio)
     - 100ms delay before LAS_Economy.endSession() (GameCenter DOM ready)
     - Arrow-based skin selector with availability guard
     - Mute icon toggles SVG paths instead of text
   ───────────────────────────────────────────── */

(function () {
  'use strict';

  // ── GameCenter stub for standalone development ──
  if (!window.GameCenter) {
    window.GameCenter = {
      completeLevel: function (gameId, levelId, reward) {
        console.log(`[GameCenter] completeLevel('${gameId}', '${levelId}', ${reward})`);
      }
    };
  }

  // ─────────────────────────────────────────────
  // GRID CALCULATION
  // ─────────────────────────────────────────────

  const LAS_CELL = LAS_Renderer.CELL;

  function LAS_calcGrid() {
    const wrap = document.getElementById('LAS_canvasWrap');
    const cols = Math.max(12, Math.floor(wrap.clientWidth  / LAS_CELL));
    const rows = Math.max(14, Math.floor(wrap.clientHeight / LAS_CELL));
    return { cols, rows };
  }

  // ─────────────────────────────────────────────
  // SKIN SELECTOR STATE
  // ─────────────────────────────────────────────

  let LAS_currentSkin    = LAS_Economy.getSelectedSkin();
  let LAS_selectorIndex  = 0;   // index into SKIN_DEFINITIONS
  let LAS_comboFlashTimer= null;
  let LAS_gameResult     = null;

  // ─────────────────────────────────────────────
  // BOOTSTRAP
  // ─────────────────────────────────────────────

  async function LAS_bootstrap() {
    const { cols, rows } = LAS_calcGrid();
    const canvas = document.getElementById('LAS_canvas');

    LAS_Renderer.initCanvas(canvas, cols, rows);
    await LAS_Renderer.buildImageCache(LAS_currentSkin);

    LAS_Core.init(cols, rows);

    LAS_bindModuleCallbacks();
    LAS_bindUIEvents();
    LAS_initSkinSelector();
    LAS_updateHUD(0);

    const best = LAS_Economy.getHighScore();
    document.getElementById('LAS_startBest').textContent = best;
    document.getElementById('LAS_bestVal').textContent   = best;
  }

  // ─────────────────────────────────────────────
  // MODULE CALLBACKS
  // ─────────────────────────────────────────────

  function LAS_bindModuleCallbacks() {

    // Frame render
    LAS_Core.onFrame(() => {
      const state       = LAS_Core.getState();
      const comboBorder = LAS_Economy.getComboMultiplier() >= 2;
      LAS_Renderer.render(state, LAS_currentSkin, comboBorder);

      if (state.gameState === 'COUNTDOWN') LAS_Renderer.drawCountdown(state.countdown);
      else if (state.gameState === 'PAUSED') LAS_Renderer.drawPauseScreen();

      LAS_updatePowerupBadge(state.activePowerup);
    });

    // State changes → pause button visibility
    LAS_Core.onStateChange((newState) => {
      const pauseBtn = document.getElementById('LAS_pauseBtn');
      if (newState === 'PLAYING') {
        pauseBtn.classList.add('visible');
        pauseBtn.textContent = 'PAUSE';
      } else if (newState === 'PAUSED') {
        pauseBtn.textContent = 'RESUME';
      } else {
        pauseBtn.classList.remove('visible');
      }
    });

    // Eat
    LAS_Core.onEat((isPowerup) => {
      LAS_Audio.init();
      isPowerup ? LAS_Audio.sfxPowerup() : LAS_Audio.sfxEat();
      LAS_Economy.onItemEaten(isPowerup);
      LAS_updateHUD(LAS_Economy.getSessionScore());
    });

    // Death
    LAS_Core.onDeath(() => {
      LAS_Audio.sfxDeath();
      const state = LAS_Core.getState();
      const score = LAS_Economy.getSessionScore();

      // Render final frozen frame with overlay
      LAS_Renderer.render(state, LAS_currentSkin, false);
      LAS_Renderer.drawGameOverScreen(score, LAS_Economy.getHighScore(), false);

      // 100ms delay ensures app.js v9.4 DOM is ready before GameCenter call
      setTimeout(() => {
        const result = LAS_Economy.endSession(score, state.length);
        LAS_gameResult = result;

        // Update best in HUD
        document.getElementById('LAS_bestVal').textContent = result.allTimeHigh;

        // Show game over screen after short moment for death anim to read
        setTimeout(() => LAS_showGameover(result, score, state.length), 700);
      }, 100);
    });

    // Turn confirmation audio (v1.2)
    LAS_Core.onTurn((x, y) => {
      LAS_Audio.sfxTurn();
      if (LAS_currentSkin === 'gold') LAS_Renderer.triggerTurnParticles(x, y);
    });

    // Invalid direction audio (v1.2)
    LAS_Core.onInvalidDirection(() => {
      LAS_Audio.sfxInvalidTurn();
    });

    // Economy callbacks
    LAS_Economy.onComboChange((multiplier) => {
      LAS_updateComboBar(multiplier);
      if (multiplier >= 2) {
        LAS_Audio.sfxCombo(multiplier);
        LAS_flashComboBorder(multiplier);
      }
    });

    LAS_Economy.onScoreChange((score) => {
      LAS_updateHUD(score);
    });

    LAS_Economy.onSkinUnlock((skinId) => {
      LAS_showUnlockToast(skinId);
      LAS_refreshSkinSelector(); // update dots/card if on start screen
    });
  }

  // ─────────────────────────────────────────────
  // UI EVENTS
  // ─────────────────────────────────────────────

  function LAS_bindUIEvents() {

    document.getElementById('LAS_playBtn').addEventListener('click', () => {
      LAS_Audio.init(); LAS_Audio.sfxStart();
      LAS_startPlay();
    });

    document.getElementById('LAS_playAgainBtn').addEventListener('click', () => {
      LAS_Audio.sfxClick();
      LAS_hideScreen('LAS_gameoverScreen');
      LAS_startPlay();
    });

    document.getElementById('LAS_menuBtn').addEventListener('click', () => {
      LAS_Audio.sfxClick();
      LAS_hideScreen('LAS_gameoverScreen');
      LAS_showScreen('LAS_startScreen');
      LAS_initSkinSelector();
      const best = LAS_Economy.getHighScore();
      document.getElementById('LAS_startBest').textContent = best;
      document.getElementById('LAS_bestVal').textContent   = best;
    });

    document.getElementById('LAS_pauseBtn').addEventListener('click', () => {
      LAS_Audio.sfxClick();
      LAS_Core.togglePause();
    });

    document.getElementById('LAS_muteBtn').addEventListener('click', () => {
      const muted = LAS_Audio.toggleMute();
      LAS_updateMuteIcon(muted);
    });

    // Arrow navigation
    document.getElementById('LAS_prevSkinBtn').addEventListener('click', () => {
      LAS_Audio.sfxClick();
      LAS_navigateSkin(-1);
    });

    document.getElementById('LAS_nextSkinBtn').addEventListener('click', () => {
      LAS_Audio.sfxClick();
      LAS_navigateSkin(1);
    });

    // Select skin button
    document.getElementById('LAS_selectSkinBtn').addEventListener('click', () => {
      const skins = LAS_Economy.getSkinDefinitions();
      const skin  = skins[LAS_selectorIndex];
      if (!LAS_Economy.isSkinAvailable(skin.id)) return;
      LAS_Audio.sfxClick();
      LAS_selectSkin(skin.id);
    });

    // Touch input on canvas
    LAS_Core.bindTouchInput(document.getElementById('LAS_canvas'));

    // Resize
    window.addEventListener('resize', LAS_handleResize);
  }

  // ─────────────────────────────────────────────
  // PLAY FLOW
  // ─────────────────────────────────────────────

  function LAS_startPlay() {
    LAS_hideScreen('LAS_startScreen');
    LAS_hideScreen('LAS_gameoverScreen');
    LAS_Economy.startSession();
    LAS_updateHUD(0);
    document.getElementById('LAS_comboBarFill').style.width = '0%';
    document.getElementById('LAS_comboMulti').textContent   = 'x1';
    document.getElementById('LAS_comboMulti').style.color   = 'var(--LAS_text3)';
    LAS_Core.startGame();
  }

  // ─────────────────────────────────────────────
  // GAME OVER
  // ─────────────────────────────────────────────

  function LAS_showGameover(result, score, length) {
    document.getElementById('LAS_goScore').textContent  = score;
    document.getElementById('LAS_goLength').textContent = length;
    document.getElementById('LAS_goBest').textContent   = result.allTimeHigh;
    document.getElementById('LAS_goReward').textContent = `+${result.rewardAmount} Coins Earned`;
    document.getElementById('LAS_goNewRecord').classList.toggle('visible', result.isNewRecord);
    LAS_showScreen('LAS_gameoverScreen');
  }

  // ─────────────────────────────────────────────
  // SKIN SELECTOR (arrow navigation)
  // ─────────────────────────────────────────────

  function LAS_initSkinSelector() {
    const skins = LAS_Economy.getSkinDefinitions();
    // Set index to currently active skin
    LAS_selectorIndex = skins.findIndex(s => s.id === LAS_currentSkin);
    if (LAS_selectorIndex < 0) LAS_selectorIndex = 0;
    LAS_refreshSkinSelector();
  }

  function LAS_navigateSkin(delta) {
    const skins = LAS_Economy.getSkinDefinitions();
    LAS_selectorIndex = (LAS_selectorIndex + delta + skins.length) % skins.length;
    LAS_refreshSkinSelector();
  }

  function LAS_refreshSkinSelector() {
    const skins     = LAS_Economy.getSkinDefinitions();
    const skin      = skins[LAS_selectorIndex];
    const highScore = LAS_Economy.getHighScore();
    const available = highScore >= skin.unlockScore;
    const isActive  = skin.id === LAS_currentSkin;

    // Preview canvas
    const previewCanvas = document.getElementById('LAS_skinPreviewCanvas');
    LAS_Renderer.drawSkinPreview(previewCanvas, skin.id, !available);

    // Card name & sub
    document.getElementById('LAS_skinCardName').textContent = skin.name;
    document.getElementById('LAS_skinCardSub').textContent  = available
      ? (isActive ? 'Active' : skin.description)
      : `Requires ${skin.unlockScore} pts`;

    document.getElementById('LAS_skinCard').classList.toggle('selected', isActive);

    // Select button — only enabled when available (v1.2 condition)
    const selectBtn = document.getElementById('LAS_selectSkinBtn');
    if (!available) {
      selectBtn.disabled = true;
      selectBtn.textContent = 'LOCKED';
    } else if (isActive) {
      selectBtn.disabled = false;
      selectBtn.textContent = 'ACTIVE';
    } else {
      selectBtn.disabled = false;
      selectBtn.textContent = 'SELECT';
    }

    // Arrow buttons
    document.getElementById('LAS_prevSkinBtn').disabled = false;
    document.getElementById('LAS_nextSkinBtn').disabled = false;

    // Dots
    const dotsEl = document.getElementById('LAS_skinDots');
    dotsEl.innerHTML = '';
    skins.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'LAS_dot' + (i === LAS_selectorIndex ? ' active' : '');
      dotsEl.appendChild(dot);
    });
  }

  async function LAS_selectSkin(skinId) {
    if (!LAS_Economy.isSkinAvailable(skinId)) return;
    LAS_currentSkin = skinId;
    LAS_Economy.setSelectedSkin(skinId);
    await LAS_Renderer.buildImageCache(skinId);
    LAS_refreshSkinSelector();
  }

  // ─────────────────────────────────────────────
  // HUD UPDATES
  // ─────────────────────────────────────────────

  function LAS_updateHUD(score) {
    document.getElementById('LAS_scoreVal').textContent = score;
  }

  function LAS_updateComboBar(multiplier) {
    const data  = LAS_Economy.getComboBarData();
    const fill  = document.getElementById('LAS_comboBarFill');
    const multi = document.getElementById('LAS_comboMulti');
    fill.style.width = data.multiplierPercent + '%';
    if (multiplier > 1) {
      multi.textContent  = `x${multiplier}`;
      multi.style.color  = 'var(--LAS_accent2)';
    } else {
      multi.textContent  = 'x1';
      multi.style.color  = 'var(--LAS_text3)';
      fill.style.width   = '0%';
    }
  }

  function LAS_updatePowerupBadge(activePowerup) {
    const badge = document.getElementById('LAS_powerupBadge');
    if (!activePowerup) {
      badge.className = 'LAS_powerupBadge';
      badge.style.display = 'none';
      return;
    }
    const labels = { magnet: 'MAGNET', ghost: 'GHOST', brake: 'BRAKE' };
    badge.className     = `LAS_powerupBadge visible ${activePowerup.type}`;
    badge.style.display = 'block';
    badge.textContent   = labels[activePowerup.type] || '';
  }

  // ─────────────────────────────────────────────
  // MUTE ICON (SVG paths toggle, no emoji)
  // ─────────────────────────────────────────────

  function LAS_updateMuteIcon(muted) {
    document.getElementById('LAS_soundWave1').style.display = muted ? 'none' : '';
    document.getElementById('LAS_soundWave2').style.display = muted ? 'none' : '';
    document.getElementById('LAS_muteX').style.display      = muted ? '' : 'none';
    document.getElementById('LAS_muteBtn').classList.toggle('active', muted);
  }

  // ─────────────────────────────────────────────
  // COMBO BORDER FLASH — solid, no blur
  // ─────────────────────────────────────────────

  function LAS_flashComboBorder(multiplier) {
    const wrap = document.getElementById('LAS_canvasWrap');
    wrap.classList.remove('LAS_combo-flash', 'LAS_combo-flash-2', 'LAS_combo-flash-3');
    if (LAS_comboFlashTimer) clearTimeout(LAS_comboFlashTimer);
    const cls = multiplier >= 5 ? 'LAS_combo-flash-3'
              : multiplier >= 3 ? 'LAS_combo-flash-2'
              : 'LAS_combo-flash';
    wrap.classList.add(cls);
    LAS_comboFlashTimer = setTimeout(() => {
      wrap.classList.remove('LAS_combo-flash', 'LAS_combo-flash-2', 'LAS_combo-flash-3');
    }, 400);
  }

  // ─────────────────────────────────────────────
  // SKIN UNLOCK TOAST
  // ─────────────────────────────────────────────

  function LAS_showUnlockToast(skinId) {
    const skin = LAS_Economy.getSkinDefinitions().find(s => s.id === skinId);
    if (!skin) return;
    const toast = document.getElementById('LAS_unlockToast');
    toast.textContent = `Unlocked: ${skin.name}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ─────────────────────────────────────────────
  // SCREEN HELPERS
  // ─────────────────────────────────────────────

  function LAS_showScreen(id) { document.getElementById(id).classList.remove('hidden'); }
  function LAS_hideScreen(id) { document.getElementById(id).classList.add('hidden'); }

  // ─────────────────────────────────────────────
  // RESIZE
  // ─────────────────────────────────────────────

  let LAS_resizeTimer = null;
  function LAS_handleResize() {
    clearTimeout(LAS_resizeTimer);
    LAS_resizeTimer = setTimeout(async () => {
      const { cols, rows } = LAS_calcGrid();
      const canvas = document.getElementById('LAS_canvas');
      LAS_Renderer.initCanvas(canvas, cols, rows);
      LAS_Core.init(cols, rows);
      await LAS_Renderer.buildImageCache(LAS_currentSkin);
    }, 200);
  }

  // ─────────────────────────────────────────────
  // GO
  // ─────────────────────────────────────────────

  LAS_bootstrap();

})();
</script>
</body>
</html>

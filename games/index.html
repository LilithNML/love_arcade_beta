<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d2b1a">
    <title>Jungle Dash — Love Arcade</title>
    <style>
        /* ── Reset y base ──────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050d07;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Contenedor principal ──────────────────────────────────────────── */
        #jd-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Canvas (posicionado absolutamente por JD_Renderer) ────────────── */
        #JD_canvas {
            position: absolute;
            display: block;
            cursor: pointer;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── HUD flotante ──────────────────────────────────────────────────── */
        #jd-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
            pointer-events: none; /* El HUD no bloquea el canvas */
        }

        /* Todos los hijos del HUD recuperan eventos de puntero */
        #jd-hud > * { pointer-events: all; }

        /* ── Botón de retorno ──────────────────────────────────────────────── */
        #jd-back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 10px;
            transition: background 0.2s;
        }
        #jd-back-btn:hover,
        #jd-back-btn:active { background: rgba(40,40,40,0.7); }
        #jd-back-btn svg { flex-shrink: 0; }

        /* ── Info de sesión (puntos) ───────────────────────────────────────── */
        #jd-session-info {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.88);
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 10px;
        }
        #jd-session-info svg { flex-shrink: 0; }
        #jd-pts-label { font-weight: 600; font-size: 11px; opacity: 0.7; }

        /* ── Botón de mute ─────────────────────────────────────────────────── */
        #jd-mute-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px;
            cursor: pointer;
            color: rgba(255,255,255,0.85);
            transition: background 0.2s;
            width: 36px;
            height: 36px;
        }
        #jd-mute-btn:hover,
        #jd-mute-btn:active { background: rgba(40,40,40,0.7); }
        .jd-sound-off { display: none; color: rgba(255,100,100,0.85); }

        /* ── HUD inferior: récord (solo visible en PLAYING) ────────────────── */
        #jd-hud-bottom {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 16px;
            pointer-events: none;
        }
        .jd-badge {
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.72);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .jd-badge span {
            color: #ffd700;
            margin-left: 4px;
        }

        /* ── Indicador de bioma ────────────────────────────────────────────── */
        #jd-biome-label {
            position: fixed;
            top: 54px;
            right: 14px;
            z-index: 99;
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            font-style: italic;
            pointer-events: none;
            transition: opacity 1s;
        }

        /* ── Instrucción táctil (aparece en móvil) ─────────────────────────── */
        #jd-touch-hint {
            position: fixed;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            display: none;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
            animation: jd-pulse 2s infinite;
        }
        @keyframes jd-pulse {
            0%, 100% { opacity: 0.5; }
            50%       { opacity: 1;   }
        }
        @media (hover: none) {
            #jd-touch-hint { display: block; }
        }

        /* ── Scrollbar oculta ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- ── Contenedor del juego ──────────────────────────────────────────────── -->
<div id="jd-container">
    <canvas id="JD_canvas" role="img" aria-label="Jungle Dash — juego de carrera infinita"></canvas>
</div>

<!-- ── HUD superior ─────────────────────────────────────────────────────── -->
<header id="jd-hud" role="toolbar" aria-label="Controles del juego">

    <!-- Botón de retorno al hub — ruta obligatoria: ../../index.html -->
    <a id="jd-back-btn" href="../../index.html" aria-label="Volver a Love Arcade">
        <!-- SVG de retorno — iconografía del brief -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <path d="M11 17.2l-6.3-6.3c-.4-.4-.4-1 0-1.4L11 3.2M7 10.1h13"/>
        </svg>
        Love Arcade
    </a>

    <!-- Info de sesión: puntuación actual — SVG del brief -->
    <div id="jd-session-info" role="status" aria-live="polite" aria-atomic="true"
         aria-label="Puntuación actual">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="jd-pts-label">PUNTOS</span>
        <!-- El score real se dibuja en el canvas; este es sólo la etiqueta del HUD -->
    </div>

    <!-- Botón de mute — SVG del brief -->
    <button id="jd-mute-btn" type="button" aria-label="Activar/desactivar audio">
        <!-- Ícono sonido activo -->
        <svg class="jd-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <!-- Ícono mute -->
        <svg class="jd-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button>
</header>

<!-- ── HUD inferior: récord ──────────────────────────────────────────────── -->
<div id="jd-hud-bottom" role="status" aria-label="Récord personal">
    <div class="jd-badge" id="jd-record-badge">
        🏆 RÉCORD <span id="jd-highscore-display">000000</span>
    </div>
</div>

<!-- ── Indicador de bioma ────────────────────────────────────────────────── -->
<div id="jd-biome-label" aria-hidden="true">Selva Densa</div>

<!-- ── Hint táctil (solo mobile) ────────────────────────────────────────── -->
<div id="jd-touch-hint" aria-hidden="true">👆 Toca para saltar · Mantén para salto alto</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Scripts — orden de carga: dependencias primero, núcleo al final.
     app.js se carga DESPUÉS de todos los scripts del juego, al final del body.
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="js/JD_Audio.js"></script>
<script src="js/JD_Physics.js"></script>
<script src="js/JD_Entities.js"></script>
<script src="js/JD_Renderer.js"></script>
<script src="js/JD_Core.js"></script>

<!-- Glue: sincronización del HUD HTML con el estado del canvas ─────────── -->
<script>
(function () {
    'use strict';

    // Actualizar el récord en el badge HTML (sin exponer variables genéricas)
    const JD_hsDisplay = document.getElementById('jd-highscore-display');
    const JD_biomeEl   = document.getElementById('jd-biome-label');

    // Ticker de UI (60fps no necesario; 10fps basta para etiquetas)
    setInterval(() => {
        if (!JD_hsDisplay) return;

        // Récord
        const JD_hs = parseInt(localStorage.getItem('JD_highscore') || '0', 10);
        JD_hsDisplay.textContent = JD_hs.toString().padStart(6, '0');

        // Etiqueta de bioma
        if (JD_biomeEl && typeof JD_Core !== 'undefined') {
            const JD_s = JD_Core.score;
            const JD_biomes = ['Selva Densa', 'Cueva Ancestral', 'Riberas'];
            const JD_idx    = JD_s < 2000 ? 0 : JD_s < 4000 ? 1 : 2;
            JD_biomeEl.textContent = JD_biomes[JD_idx];
        }
    }, 100);
})();
</script>

<!-- Motor central de Love Arcade — DEBE ir al final del body ────────────── -->
<script src="../../js/app.js"></script>

</body>
</html>

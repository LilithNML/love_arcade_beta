<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d2b1a">
    <title>Jungle Dash</title>
    <style>
        /* ── Reset y base ──────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050d07;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Contenedor principal ──────────────────────────────────────────── */
        /* Sin box-shadow ni border: en fullscreen generan gaps blancos y
           consumen GPU innecesariamente.                                       */
        #jd-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Canvas ────────────────────────────────────────────────────────── */
        #JD_canvas {
            position: absolute;
            display: block;
            cursor: pointer;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── HUD flotante ──────────────────────────────────────────────────── */
        #jd-hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1vh 1.5vw;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent);
            pointer-events: none;
        }
        #jd-hud > * { pointer-events: all; }

        /* ── Botón de retorno ──────────────────────────────────────────────── */
        #jd-back-btn {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: clamp(11px, 1.2vw, 14px);
            font-weight: 600;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.6vh 1vw;
            transition: background 0.2s;
        }
        #jd-back-btn:hover,
        #jd-back-btn:active { background: rgba(40,40,40,0.7); }
        #jd-back-btn svg { flex-shrink: 0; }

        /* ── Info de sesión: puntuación en vivo ────────────────────────────── */
        /* JD_drawHUD() fue eliminado del canvas (v1.2.0). La puntuación ahora
           se muestra aquí, con renderizado nítido del navegador en Retina/OLED. */
        #jd-session-info {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            color: rgba(255,255,255,0.88);
            font-size: clamp(11px, 1.2vw, 14px);
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 0.6vh 1vw;
        }
        #jd-session-info svg { flex-shrink: 0; }
        #jd-pts-label {
            font-weight: 600;
            font-size: clamp(10px, 1vw, 12px);
            opacity: 0.7;
            margin-right: 2px;
        }
        #jd-score-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            font-size: clamp(13px, 1.4vw, 16px);
            letter-spacing: 1px;
            color: #fff;
        }

        /* ── HUD inferior: récord ──────────────────────────────────────────── */
        #jd-hud-bottom {
            position: fixed;
            bottom: 1.5vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 2vw;
            pointer-events: none;
        }
        .jd-badge {
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 0.5vh 1.5vw;
            color: rgba(255,255,255,0.72);
            font-size: clamp(10px, 1.1vw, 13px);
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .jd-badge span {
            color: #ffd700;
            margin-left: 4px;
        }

        /* ── Botón de mute (solo en START / GAMEOVER) ──────────────────────── */
        /* Desacoplado del HUD superior para evitar activaciones accidentales
           con los pulgares. La clase .jd-hidden la gestiona el glue script.   */
        #jd-mute-container {
            position: fixed;
            bottom: 4vh;
            right: 2vw;
            z-index: 200;
            transition: opacity 0.3s, visibility 0.3s;
        }
        #jd-mute-container.jd-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #jd-mute-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            cursor: pointer;
            color: rgba(255,255,255,0.85);
            transition: background 0.2s;
            width: clamp(32px, 3.5vw, 44px);
            height: clamp(32px, 3.5vw, 44px);
        }
        #jd-mute-btn:hover,
        #jd-mute-btn:active { background: rgba(40,40,40,0.75); }
        .jd-sound-off { display: none; color: rgba(255,100,100,0.85); }

        /* ── Overlay "Gira tu dispositivo" ─────────────────────────────────── */
        /*
         * COMPORTAMIENTO v1.2.0:
         *   - Oculto por defecto (display: none).
         *   - El juego permanece VISIBLE en portrait para que el usuario pueda
         *     tocar la pantalla y desencadenar requestFullscreen() + orientation.lock().
         *   - El overlay se activa ÚNICAMENTE por JS (clase .jd-visible) cuando
         *     orientation.lock() es rechazado por el navegador (ej. iOS Safari web).
         *   - Desaparece automáticamente cuando el usuario gira el dispositivo
         *     (listener 'orientationchange' en el glue script).
         *
         * NO hay ninguna regla @media (orientation: portrait) que oculte el canvas
         * o el contenedor del juego.
         */
        #jd-rotate-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(5, 13, 7, 0.96);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: rgba(255,255,255,0.85);
            text-align: center;
            padding: 24px;
        }
        #jd-rotate-overlay.jd-visible {
            display: flex;
        }
        #jd-rotate-overlay svg {
            animation: jd-rotate-icon 2s ease-in-out infinite;
            opacity: 0.75;
        }
        @keyframes jd-rotate-icon {
            0%, 100% { transform: rotate(-20deg); }
            50%       { transform: rotate(20deg);  }
        }
        #jd-rotate-overlay p {
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        #jd-rotate-overlay small {
            font-size: clamp(12px, 2.5vw, 15px);
            opacity: 0.55;
        }

        /* ── Scrollbar oculta ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- ── Overlay "Gira tu dispositivo" ────────────────────────────────────── -->
<!-- Activado exclusivamente por JS en _requestFullscreen() cuando
     orientation.lock() falla. Crítico para iOS Safari (no soporta la API en web).
     El juego es visible en portrait para permitir la interacción inicial.      -->
<div id="jd-rotate-overlay" role="alert" aria-live="assertive">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
         stroke="rgba(255,255,255,0.75)" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
        <path d="M17 9l3 3-3 3" stroke="rgba(255,200,0,0.9)" stroke-width="2"/>
        <path d="M20 12H10" stroke="rgba(255,200,0,0.9)" stroke-width="2"/>
    </svg>
    <p>Gira tu dispositivo</p>
    <small>Jungle Dash requiere orientación horizontal</small>
</div>

<!-- ── Contenedor del juego ──────────────────────────────────────────────── -->
<div id="jd-container">
    <canvas id="JD_canvas" role="img" aria-label="Jungle Dash — juego de carrera infinita"></canvas>
</div>

<!-- ── HUD superior ─────────────────────────────────────────────────────── -->
<header id="jd-hud" role="toolbar" aria-label="Controles del juego">

    <!-- Botón de retorno al hub — ruta obligatoria: ../../index.html -->
    <a id="jd-back-btn" href="../../index.html" aria-label="Volver a Love Arcade">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <path d="M11 17.2l-6.3-6.3c-.4-.4-.4-1 0-1.4L11 3.2M7 10.1h13"/>
        </svg>
        Love Arcade
    </a>

    <!-- Puntuación en vivo — renderizado DOM (nítido en Retina / OLED)     -->
    <!-- Reemplaza al antiguo JD_drawHUD() del canvas, eliminado en v1.2.0. -->
    <!-- El glue script actualiza #jd-score-display a 10 fps.               -->
    <div id="jd-session-info" role="status" aria-live="polite" aria-atomic="true"
         aria-label="Puntuación actual">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="jd-pts-label">PTS</span>
        <span id="jd-score-display">000000</span>
    </div>

</header>

<!-- ── HUD inferior: récord ──────────────────────────────────────────────── -->
<div id="jd-hud-bottom" role="status" aria-label="Récord personal">
    <div class="jd-badge" id="jd-record-badge">
        RÉCORD <span id="jd-highscore-display">000000</span>
    </div>
</div>

<!-- ── Botón de mute (pantallas START / GAMEOVER) ────────────────────────── -->
<div id="jd-mute-container" aria-label="Control de audio">
    <button id="jd-mute-btn" type="button" aria-label="Activar/desactivar audio">
        <svg class="jd-sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <svg class="jd-sound-off" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
    </button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Scripts — orden de carga: dependencias primero, núcleo al final.
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="js/JD_Audio.js"></script>
<script src="js/JD_Physics.js"></script>
<script src="js/JD_Entities.js"></script>
<script src="js/JD_Renderer.js"></script>
<script src="js/JD_Core.js"></script>

<!-- Glue: sincronización del HUD DOM con el estado interno del juego ──── -->
<script>
(function () {
    'use strict';

    const JD_scoreDisplay  = document.getElementById('jd-score-display');
    const JD_hsDisplay     = document.getElementById('jd-highscore-display');
    const JD_muteContainer = document.getElementById('jd-mute-container');
    const JD_overlay       = document.getElementById('jd-rotate-overlay');

    // ── Visibilidad del botón de mute ────────────────────────────────────────
    // Solo visible en START y GAMEOVER. Oculto en PLAYING para evitar
    // activaciones accidentales con los pulgares durante el juego.
    function JD_syncMuteVisibility() {
        if (!JD_muteContainer || typeof JD_Core === 'undefined') return;
        JD_muteContainer.classList.toggle('jd-hidden', JD_Core.state === 'PLAYING');
    }

    // ── Listener de orientación para ocultar el overlay ──────────────────────
    // Cuando el usuario rota manualmente a landscape tras ver el overlay, este
    // desaparece sin necesidad de ninguna interacción adicional.
    window.addEventListener('orientationchange', () => {
        if (!JD_overlay) return;
        // Pequeño delay para que innerWidth/Height se actualicen tras el evento
        setTimeout(() => {
            if (window.innerWidth > window.innerHeight) {
                JD_overlay.classList.remove('jd-visible');
            }
        }, 100);
    });

    // ── Ticker de UI a 10 fps ────────────────────────────────────────────────
    // 100 ms es suficiente para actualizar contadores de texto en el HUD.
    setInterval(() => {

        // Puntuación en vivo — sustituye a JD_drawHUD() eliminado del canvas
        if (JD_scoreDisplay && typeof JD_Core !== 'undefined') {
            JD_scoreDisplay.textContent = Math.floor(JD_Core.score)
                .toString().padStart(6, '0');
        }

        // Récord personal
        if (JD_hsDisplay) {
            const JD_hs = parseInt(localStorage.getItem('JD_highscore') || '0', 10);
            JD_hsDisplay.textContent = JD_hs.toString().padStart(6, '0');
        }

        // Visibilidad del botón de mute según estado del juego
        JD_syncMuteVisibility();

    }, 100);
})();
</script>

<!-- Motor central de Love Arcade — DEBE ir al final del body ────────────── -->
<!-- ⚠️  NO MODIFICAR: crítico para la persistencia de monedas y la
     comunicación con el backend de la plataforma (Game Center).              -->
<script src="../../js/app.js"></script>

</body>
</html>

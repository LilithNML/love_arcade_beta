<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Arkanoid — Love Arcade. Modo infinito.">
  <title>ARKANOID — Love Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ark-primary: #ff1f8f;
      --ark-cyan:    #00e8ff;
      --ark-yellow:  #ffe600;
      --ark-text:    #e8d5ff;
      --ark-dim:     rgba(255,255,255,0.18);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #06010f;
      font-family: 'Orbitron', sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #ARK_wrapper { position: fixed; inset: 0; }
    #ARK_canvas  { display: block; cursor: none; image-rendering: pixelated; }

    /* CRT scanline overlay */
    #ARK_wrapper::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    /* ── SCREEN OVERLAYS ── */
    .ark-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0; padding: 24px;
      pointer-events: none; opacity: 0; transform: scale(1.04);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .ark-screen.ark-visible { opacity: 1; transform: scale(1); pointer-events: all; }

    /* Glass panel */
    .ark-panel {
      background: rgba(6,1,20,0.94);
      border: 1px solid rgba(255,31,143,0.35);
      border-radius: 16px; padding: 36px 40px;
      text-align: center; max-width: 320px; width: 100%;
      box-shadow: 0 0 60px rgba(255,31,143,0.10);
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    /* ── TYPOGRAPHY ── */
    .ark-logo {
      font-size: clamp(2.4rem, 9vw, 3.6rem); font-weight: 900; letter-spacing: 0.14em;
      color: #fff; line-height: 1;
      text-shadow: 0 0 20px var(--ark-primary), 0 0 60px rgba(255,31,143,0.35);
    }
    .ark-sub {
      font-family: 'Share Tech Mono', monospace; font-size: 0.68rem;
      color: var(--ark-cyan); letter-spacing: 0.3em;
      text-shadow: 0 0 10px var(--ark-cyan);
    }
    .ark-title {
      font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 700;
      color: #fff; letter-spacing: 0.1em;
      text-shadow: 0 0 14px var(--ark-cyan);
    }
    .ark-body { font-family: 'Share Tech Mono', monospace; font-size: 0.76rem; color: var(--ark-text); line-height: 1.6; }

    /* Big coin display */
    .ark-coins-big {
      font-size: clamp(2.6rem, 10vw, 3.4rem); font-weight: 900;
      color: var(--ark-yellow);
      text-shadow: 0 0 28px var(--ark-yellow), 0 0 60px rgba(255,230,0,0.3);
      line-height: 1;
    }
    .ark-level-label {
      font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
      color: var(--ark-cyan); letter-spacing: 0.2em;
    }
    .ark-divider { width: 60px; height: 1px; background: linear-gradient(90deg,transparent,var(--ark-cyan),transparent); }

    /* Power-up guide grid */
    .ark-guide {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 6px 12px; padding-top: 2px;
    }
    .ark-guide-item {
      font-family: 'Share Tech Mono', monospace; font-size: 0.63rem;
      color: var(--ark-text); display: flex; align-items: center; gap: 5px;
    }
    .ark-pw-badge {
      width: 18px; height: 18px; border-radius: 4px;
      font-size: 0.6rem; font-weight: 700; font-family: 'Orbitron', sans-serif;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── BUTTONS ──
       touch-action: manipulation prevents 300ms tap delay and lets
       pointerdown fire immediately without click-synthesis issues. */
    .ark-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none;
      padding: 14px 28px; min-height: 52px; width: 100%;
      border: 2px solid currentColor; border-radius: 8px; background: transparent;
      cursor: pointer; position: relative; overflow: hidden;
      transition: box-shadow 0.16s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .ark-btn::before { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity 0.16s; }
    .ark-btn:hover::before, .ark-btn:active::before { opacity: 0.10; }
    .ark-btn:active { transform: scale(0.97); }

    .ark-btn-primary { color: var(--ark-primary); }
    .ark-btn-primary:hover { box-shadow: 0 0 20px var(--ark-primary), 0 0 40px rgba(255,31,143,0.2); }
    .ark-btn-cyan    { color: var(--ark-cyan); }
    .ark-btn-cyan:hover { box-shadow: 0 0 20px var(--ark-cyan); }
    .ark-btn-dim     { color: var(--ark-dim); border-color: var(--ark-dim); }

    .ark-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    /* ── HUB LINK ── */
    #ARK_hub-link {
      position: fixed; top: 12px; left: 12px; z-index: 20;
      font-family: 'Share Tech Mono', monospace; font-size: 0.63rem; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.35); text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12); padding: 8px 12px; border-radius: 6px;
      min-height: 44px; min-width: 44px; display: flex; align-items: center; gap: 6px;
      background: rgba(6,1,20,0.7); opacity: 0.7;
      transition: color .2s, border-color .2s, box-shadow .2s, opacity .2s;
      touch-action: manipulation;
    }
    #ARK_hub-link:hover { color: var(--ark-cyan); border-color: var(--ark-cyan); box-shadow: 0 0 12px rgba(0,232,255,0.2); }

    /* ── ARIA LIVE (visually hidden) ── */
    #ARK_aria-status {
      position: absolute; width: 1px; height: 1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>

  <div id="ARK_aria-status" role="status" aria-live="polite" aria-atomic="true"></div>

  <a id="ARK_hub-link" href="../../index.html" aria-label="Volver al hub de Love Arcade">← HUB</a>

  <div id="ARK_wrapper">
    <canvas id="ARK_canvas" role="img" aria-label="Pantalla de juego Arkanoid"></canvas>
  </div>


  <!-- ══════════════════════════════════════
       START
       ══════════════════════════════════════ -->
  <div id="ARK_screen-start" class="ark-screen" role="main">
    <div class="ark-panel">
      <div class="ark-logo">ARKANOID</div>
      <div class="ark-sub">LOVE ARCADE · MODO INFINITO</div>
      <div class="ark-divider"></div>
      <p class="ark-body">Destruye los bloques.<br>Los niveles no terminan. ¿Hasta dónde llegarás?</p>
      <div class="ark-guide" aria-label="Power-ups">
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#00cc66;color:#000">E</span>Paleta ancha</div>
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#00e8ff;color:#000">M</span>Multi-bola</div>
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#4488ff;color:#fff">S</span>Cámara lenta</div>
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#ff1f8f;color:#fff">♥</span>Vida extra</div>
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#ffe600;color:#000">🛡</span>Escudo</div>
        <div class="ark-guide-item"><span class="ark-pw-badge" style="background:#ff6600;color:#fff">🔥</span>Bola de fuego</div>
      </div>
      <div class="ark-btn-group" style="margin-top:8px">
        <button class="ark-btn ark-btn-primary" id="ARK_btn-start">▶ JUGAR</button>
        <a class="ark-btn ark-btn-dim" href="../../index.html">← HUB</a>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       PAUSE
       ══════════════════════════════════════ -->
  <div id="ARK_screen-pause" class="ark-screen" role="dialog" aria-modal="true">
    <div class="ark-panel">
      <div class="ark-title">⏸ PAUSA</div>
      <div class="ark-divider"></div>
      <p class="ark-body" id="ARK_pause-info">Nivel 1</p>
      <div class="ark-btn-group" style="margin-top:8px">
        <button class="ark-btn ark-btn-primary" id="ARK_btn-resume">▶ CONTINUAR</button>
        <button class="ark-btn ark-btn-dim"     id="ARK_btn-quit-pause">✕ SALIR AL HUB</button>
      </div>
    </div>
  </div>


  <!-- ══════════════════════════════════════
       GAME OVER — coins only
       ══════════════════════════════════════ -->
  <div id="ARK_screen-gameover" class="ark-screen" role="dialog" aria-modal="true">
    <div class="ark-panel">
      <div class="ark-title" style="color:var(--ark-primary)">GAME OVER</div>
      <div class="ark-divider"></div>
      <div class="ark-coins-big" id="ARK_go-coins">0 🪙</div>
      <div class="ark-level-label" id="ARK_go-level">Nivel 1</div>
      <div class="ark-btn-group" style="margin-top:14px">
        <button class="ark-btn ark-btn-primary" id="ARK_btn-restart">↺ JUGAR DE NUEVO</button>
        <a class="ark-btn ark-btn-dim" href="../../index.html">← HUB</a>
      </div>
    </div>
  </div>


  <!-- ES Module entry point -->
  <script type="module">
    import { ARK_UI } from './js/ark.ui.js';
    ARK_UI.init();
  </script>

  <!-- Love Arcade Core — MUST be last (spec §3.3) -->
  <script src="../../js/app.js"></script>
</body>
</html>

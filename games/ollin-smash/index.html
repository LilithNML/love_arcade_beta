<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ollin Smash — Love Arcade</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap"
        rel="stylesheet">

  <!-- Game stylesheet -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div id="os-wrapper">

    <!-- Game canvas — logical size 390×700, CSS scales it -->
    <canvas id="os-canvas" width="390" height="700"></canvas>

    <!-- Back to hub -->
    <a id="os-back" href="../../index.html">
      <svg width="8" height="12" viewBox="0 0 8 12" fill="none"
           stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M7 1L1 6l6 5"/>
      </svg>
      HUB
    </a>

    <!-- ── HUD ──────────────────────────────────────────────────────────────── -->
    <div id="os-hud">
      <div class="os-hud-top">
        <div class="os-hud-col">
          SCORE
          <span id="os-h-score">0</span>
        </div>
        <div class="os-hud-col" style="text-align:center;">
          VIDAS
          <div class="os-lives-row" id="os-h-lives"></div>
        </div>
        <div class="os-hud-col" style="text-align:right;">
          MONEDAS
          <span class="gold" id="os-h-coins">0</span>
        </div>
      </div>
      <div id="os-mult-badge"></div>

      <!-- Pause button — pointer-events reset so it's clickable inside the HUD -->
      <button id="os-btn-pause" aria-label="Pausar juego">
        <!-- Two vertical bars = pause icon -->
        <svg width="12" height="14" viewBox="0 0 12 14" fill="currentColor" aria-hidden="true">
          <rect x="1" y="0" width="3.5" height="14" rx="1"/>
          <rect x="7.5" y="0" width="3.5" height="14" rx="1"/>
        </svg>
      </button>
    </div>

    <!-- ── Power-up pills ───────────────────────────────────────────────────── -->
    <div id="os-pu-bar">

      <!-- PU_LONG — double-headed arrow -->
      <div class="os-pu-pill" id="os-pill-long">
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none"
             stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M1 5h12M3 2L1 5l2 3M11 2l2 3-2 3"/>
        </svg>
        <span id="os-pill-long-t">20s</span>
      </div>

      <!-- PU_FIRE — flame -->
      <div class="os-pu-pill" id="os-pill-fire">
        <svg width="12" height="14" viewBox="0 0 12 14" fill="none"
             stroke="#DC2626" stroke-width="1.4" aria-hidden="true">
          <path d="M6 1c-1 3-4 3-4 6a4 4 0 008 0c0-3-3-3-3-6z"/>
          <path d="M6 8c-.5 1-1.5 1.5-1.5 2"/>
        </svg>
        <span id="os-pill-fire-t">30s</span>
      </div>

      <!-- PU_SLOW — hourglass -->
      <div class="os-pu-pill" id="os-pill-slow">
        <svg width="12" height="14" viewBox="0 0 12 14" fill="none"
             stroke="#7C3AED" stroke-width="1.4" aria-hidden="true">
          <rect x="2" y="1" width="8" height="12" rx="1"/>
          <path d="M3 1h6M3 13h6M4 1l2 5 2-5M4 13l2-5 2 5"/>
        </svg>
        <span id="os-pill-slow-t">15s</span>
      </div>

      <!-- PU_MAGNET — magnet -->
      <div class="os-pu-pill" id="os-pill-magnet">
        <svg width="14" height="12" viewBox="0 0 14 12" fill="none"
             stroke="#06B6D4" stroke-width="1.4" aria-hidden="true">
          <path d="M2 2v4a5 5 0 0010 0V2"/>
          <line x1="2"  y1="2" x2="2"  y2="5"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="2"  y1="9" x2="2"  y2="12"/>
          <line x1="12" y1="9" x2="12" y2="12"/>
        </svg>
        <span id="os-pill-mag-t">5</span>
      </div>

    </div><!-- /os-pu-bar -->

    <!-- ── Wave label ────────────────────────────────────────────────────────── -->
    <div id="os-wave-lbl">OLEADA 1</div>

    <!-- ── Wave flash ────────────────────────────────────────────────────────── -->
    <div id="os-wave-flash"></div>

    <!-- ── MENU ──────────────────────────────────────────────────────────────── -->
    <div class="os-overlay" id="os-menu">
      <div style="text-align:center;">
        <div class="os-logo-eye">Neo Arcade</div>
        <div class="os-logo-main">OLLIN<br>SMASH</div>
        <div class="os-logo-tag">Movimiento Infinito</div>
      </div>
      <div class="os-rule"></div>
      <button class="os-btn" id="os-btn-start">INICIAR</button>
      <div class="os-hs-line">RECORD: <span id="os-hs">0</span></div>
      <button class="os-btn os-btn-sm"
              onclick="window.location.href='../../index.html'">
        VOLVER
      </button>
      <div class="os-standalone-notice" id="os-notice-menu">
        MODO PRACTICA — LAS MONEDAS NO SE GUARDARAN
      </div>
    </div>

    <!-- ── PAUSE ─────────────────────────────────────────────────────────────── -->
    <div class="os-overlay hidden" id="os-paused">
      PAUSA
      <div class="os-pause-hint">TOCA PARA CONTINUAR</div>
      <button class="os-btn" id="os-btn-resume">CONTINUAR</button>
    </div>

    <!-- ── GAME OVER ──────────────────────────────────────────────────────────── -->
    <div class="os-overlay hidden" id="os-gameover">
      <div class="os-go-title">GAME OVER</div>
      <div class="os-rule"></div>
      <div class="os-go-stats">
        PUNTUACION
        <strong id="os-go-score">0</strong>
        OLEADA ALCANZADA
        <strong id="os-go-wave">1</strong>
        MONEDAS GANADAS
        <strong id="os-go-coins">0</strong>
      </div>
      <button class="os-btn"    id="os-btn-retry">REINTENTAR</button>
      <button class="os-btn os-btn-sm" id="os-btn-menu">MENU</button>
    </div>

  </div><!-- /os-wrapper -->

  <!--
    ┌─────────────────────────────────────────────────────────────────┐
    │  Script loading order — DO NOT change                           │
    │                                                                 │
    │  1. main.js (type="module")                                     │
    │     Deferred by the browser; executes AFTER full DOM parse      │
    │     and AFTER synchronous classic scripts below.                │
    │                                                                 │
    │  2. app.js (classic synchronous)                                │
    │     Runs immediately when the parser reaches this tag.          │
    │     Sets window.GameCenter before main.js initialises.          │
    │                                                                 │
    │  Result: window.GameCenter is always available when boot()      │
    │  runs inside main.js.                                           │
    └─────────────────────────────────────────────────────────────────┘
  -->
  <script type="module" src="./js/main.js"></script>

  <!-- Love Arcade Core — must stay last, must stay a classic script -->
  <script src="../../js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Arcade</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        /* ── SPA View Transition ───────────────── */
        #view-container {
            will-change: opacity, transform;
        }
        #view-container.view-exit {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        #view-container.view-enter {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
    </style>
</head>
<body>

    <!-- ── TOP NAVBAR (Shell — siempre visible) ── -->
    <nav class="navbar glass-panel">
        <div class="nav-brand" id="nav-brand-link" style="cursor:pointer;">
            <i data-lucide="gamepad-2" size="26"></i>
            Love<span>Arcade</span>
        </div>

        <ul class="nav-links">
            <li><a href="#/" class="nav-link" data-spa-route="/">Inicio</a></li>
            <li><a href="#games" class="nav-link js-scroll-home">Juegos</a></li>
            <li><a href="#/shop" class="nav-link" data-spa-route="/shop">Tienda</a></li>
            <li><a href="#faq" class="nav-link js-scroll-home">Ayuda</a></li>
        </ul>

        <div class="nav-user">
            <div class="coin-badge">
                <span class="moon-blessing-badge hidden" title="Bendición Lunar activa">
                    <i data-lucide="moon" size="13"></i>
                </span>
                <i data-lucide="star" size="15" fill="#fbbf24" stroke="none"></i>
                <span class="coin-display">0</span>
            </div>
            <label for="avatar-upload" class="avatar-container">
                <div class="avatar" id="user-avatar-display" style="background-image: url('assets/default_avatar.png');">
                    <i data-lucide="user" size="18"></i>
                </div>
                <div class="avatar-edit-icon"><i data-lucide="plus"></i></div>
            </label>
            <input type="file" id="avatar-upload" hidden accept="image/*">
        </div>
    </nav>

    <!-- ── BOTTOM NAV (mobile — Shell) ── -->
    <nav class="bottom-nav">
        <a href="#/" class="b-nav-item" data-spa-route="/">
            <i data-lucide="home" size="20"></i>
            <span>Inicio</span>
        </a>
        <a href="#games" class="b-nav-item js-scroll-home">
            <i data-lucide="gamepad-2" size="20"></i>
            <span>Juegos</span>
        </a>
        <a href="#/shop" class="b-nav-item" data-spa-route="/shop">
            <i data-lucide="shopping-bag" size="20"></i>
            <span>Tienda</span>
        </a>
        <a href="#faq" class="b-nav-item js-scroll-home">
            <i data-lucide="help-circle" size="20"></i>
            <span>Ayuda</span>
        </a>
    </nav>

    <!-- ── SPA MOUNT POINT ── -->
    <div id="view-container"></div>

    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
